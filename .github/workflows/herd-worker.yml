name: HerdOS Worker
run-name: "Herd Worker #${{ inputs.issue_number }}"
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to work on'
        required: true
        type: number
      batch_branch:
        description: 'Batch branch to base work on (empty = main)'
        required: false
        type: string
        default: ''
      timeout_minutes:
        description: 'Max execution time'
        required: false
        type: number
        default: 30
      runner_label:
        description: 'Runner label override (default from config)'
        required: false
        type: string
        default: 'herd-worker'

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  execute:
    if: vars.HERD_ENABLED == 'true'
    runs-on: [self-hosted, '${{ inputs.runner_label }}']
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.batch_branch || github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.HERD_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Execute task
        env:
          HERD_RUNNER: "true"
          GITHUB_TOKEN: ${{ secrets.HERD_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          herd worker exec "$ISSUE_NUMBER"
