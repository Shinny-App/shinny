  status: 2

null_score_game:
  league: ice_league
  home_team: team_a
  away_team: team_b
  scheduled_at: <%= 7.days.ago %>
  status: 1

deadline_passed_game:
  league: ice_league
  home_team: team_a
  away_team: team_b
  scheduled_at: <%= 1.day.from_now %>
  status: 0
