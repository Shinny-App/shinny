scheduled_game:
  league: ice_league
  home_team: team_a
  away_team: team_b
  scheduled_at: <%= 3.days.from_now %>
  status: 0
  location: main_rink

completed_game:
  league: ice_league
  home_team: team_a
  away_team: team_b
  scheduled_at: <%= 3.days.ago %>
  status: 1
  home_score: 3
  away_score: 1
  location: main_rink

tied_game:
