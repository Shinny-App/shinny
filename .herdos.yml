version: 1
platform:
    provider: github
    owner: Shinny-App
    repo: shinny
agent:
    provider: claude
    binary: ""
    model: ""
    max_turns: 0
workers:
    max_concurrent: 3
    runner_label: herd-worker
    timeout_minutes: 30
integrator:
    strategy: squash
    on_conflict: dispatch-resolver
    max_conflict_resolution_attempts: 2
    require_ci: true
    review: true
    review_max_fix_cycles: 10
    review_strictness: standard
    ci_max_fix_cycles: 10
monitor:
    patrol_interval_minutes: 15
    stale_threshold_minutes: 30
    max_pr_age_hours: 24
    auto_redispatch: true
    max_redispatch_attempts: 3
    notify_on_failure: true
    notify_users: []
pull_requests:
    auto_merge: false
    co_author_email: ""
